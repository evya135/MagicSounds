<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magician App</title>
    <script src="script.js" defer type="module"></script>
    <style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
}

body {
    min-height: 100vh;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* full page */
.screen {
    position: fixed;
    inset: 0;
    min-height: 100vh;
    width: 100%;
    overflow: hidden;

    background:
        repeating-linear-gradient(
            90deg,
            rgba(255,255,255,0.015) 0px,
            rgba(255,255,255,0.015) 2px,
            transparent 2px,
            transparent 26px
        ),
        radial-gradient(
            circle at center,
            rgba(90, 110, 180, 0.18) 0%,
            rgba(40, 45, 80, 0.08) 35%,
            rgba(15, 18, 35, 0) 70%
        ),
        linear-gradient(
            180deg,
            rgb(24, 27, 46) 0%,
            rgb(15, 18, 35) 100%
        );
}
.dim {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.3); /* change this */
    pointer-events: none;
    z-index: 9999;
    opacity: 0;
    display: block;
    transition: 0.3s;
}
/* main button centered */
.main-btn {
    position: absolute;
    left: 50%;
    top: 35%;
    transform: translate(-50%, -50%);

    width: min(72vw, 780px);
    height: clamp(90px, 14vw, 180px);
    border: none;
    border-radius: clamp(18px, 2.2vw, 30px);
    cursor: pointer;
    backdrop-filter: blur(1px);

    /* darker base (important change) */
   background:
    /* uneven light patches */
    radial-gradient(
        circle at 12% 70%,
        rgba(255,255,255,0.06),
        transparent 60%
    ),
    radial-gradient(
        ellipse at 40% 70%,
        rgba(255,255,255,0.06),
        rgba(0, 0, 0, 0.1),
        transparent 35%
    ),
    radial-gradient(
        circle at 31% 90%,
        rgba(0,0,0,0.08),
        rgba(14, 13, 13, 0.2),
        transparent 70%
    ),

    /* base gradient */
    linear-gradient(
        180deg,
        rgba(255,255,255,0.22) 0%,
        rgba(255,255,255,0.07) 35%,
        rgba(0,0,0,0.18) 100%
    ),
    linear-gradient(
        360deg,
        rgb(2, 0, 14) 100%,
        transparent 0%
    );
    

    box-shadow:
    0 0 0 2px rgba(120, 190, 255, 1),
    0 0 20px rgba(80, 170, 255, 1),
    0 0 50px rgba(70, 150, 255, 0.7),

    /* THIS is new */
    0 0 120px rgba(60, 120, 255, 0.25),

    0 20px 40px rgba(0, 0, 0, 0.6);
}

/* inner panel (this is where most of the realism happens) */
.main-btn::before {
    content: "";
    position: absolute;
    inset: 8px;
    border-radius: inherit;

    /* more contrast inside */
    background: linear-gradient(
        180deg,
        rgba(255,255,255,0.25) 0%,
        rgba(255,255,255,0.08) 35%,
        rgba(0,0,0,0.15) 100%
    );

    border: 2px solid rgba(255,255,255,0.5);

    box-shadow:
    inset 0 2px 4px rgba(255,255,255,0.25),
    inset 0 -14px 35px rgba(0,0,0,0.3),
    inset 0 0 8px rgba(255,255,255,0.15);
}

/* TOP SHINE (this was too weak before) */
.main-btn::after {
    content: "";
    position: absolute;

    left: 10%;
    right: 30%;
    top: 6%;
    height: 35%;

    border-radius: 100px;

    background: radial-gradient(
        ellipse at left,
        rgba(255,255,255,0.7),
        rgba(255,255,255,0.15) 40%,
        transparent 70%
    );

    filter: blur(6px);
    opacity: 0.9;
}

/* bottom bar */
.bottomBar {
    position: absolute;
    left: 0;
    bottom: 20px;
    width: 100%;
    padding: 0 24px;
    display: flex;
    gap: 18px;
}

.backBTN,
.forwardBTN {
    flex: 1;
    height: 70px;
    border-radius: 16px;
    border: 2px solid rgba(255,255,255,0.5);
    background: rgba(180, 170, 180, 0.45);
    opacity: 0;
}

/* sound text */
.soundText {
    position: absolute;
    left: 50%;
    bottom: 110px;
    transform: translateX(-50%);
    color: white;
    text-align: center;
    font-size: 24px;
    white-space: pre-line;
}
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
        }
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 100px;
        }
        .mainBTN {
            width: 80%;
            height: 200px;
            background-color: rgb(75, 74, 74);
            border-radius: 20px;
        }

            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;

            display: flex;
            justify-content: space-between;
            padding: 20px;

        } */

            background-color: rgb(75, 74, 74);
            border-radius: 15px;
        } */
        .soundText{
            font-size:30px;
            color: #e7e6d5;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="dim" id="dimLayer"></div>
        <div class="controls">
                <div class="screen">
                    <button class="main-btn" id="play"></button>
                </div>
            <div class="bottomBar">
                <button class="backBTN" id="back"></button>
                <text id="soundName" class="soundText"></text>
                <button class="forwardBTN" id="forward"></button>
            </div>
        </div>
</body>
</html>
